distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# The client build uses Gradle 9.4 to satisfy Fabric Loom 1.15.4, which is needed to build
# Minecraft 1.21.11 AND to consume GeckoLib 5.4.5 (built with Loom 1.15.4). This is separate from
# the backend's Gradle 8.14 (pinned by Spring Boot 4), which is why the client has its own wrapper.
distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
